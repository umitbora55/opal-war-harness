    - COOLDOWN_BYPASS
    - PAYWALL_MISTIMING
    - ENTITLEMENT_DRIFT
    - UNSAFE_IRL_PROGRESSION
    - FAKE_READINESS
    - LOCALIZATION_MISMATCH
    - FAIRNESS_BREACH
    - BUDGET_OVERSPEND
    - AUDIT_MISSING
    - REPLAY_MISMATCH
