name: OPAL WAR HARNESS

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 1'

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opal-war-harness
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npm run smoke -- --config ./configs/base.json
      - uses: actions/upload-artifact@v4
        with:
          name: war-harness-smoke-report
          path: |
            opal-war-harness/reports/**
  behavioral:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opal-war-harness
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run behavioral -- --config ./configs/sandbox.json
      - uses: actions/upload-artifact@v4
        with:
          name: war-harness-behavioral-report
          path: |
            opal-war-harness/reports/**
  certification:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opal-war-harness
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run certify -- --config ./configs/release.json
      - uses: actions/upload-artifact@v4
        with:
          name: war-harness-certification-report
          path: |
            opal-war-harness/reports/**
